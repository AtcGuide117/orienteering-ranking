<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>定向越野积分赛排名 - 2026</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo-title">
                <span class="logo-icon">🧭</span>
                <h1>定向越野积分赛</h1>
            </div>
            <nav>
                <a href="#" class="active">排名榜</a>
                <a href="#">活动日程</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="search-section">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="playerSearch" placeholder="输入选手姓名查找...">
            </div>
        </div>
        
        <section class="ranking-section">
            <div class="table-card">
                <div class="table-header">
                    <h2>总积分实时排名</h2>
                </div>
                <div class="table-responsive">
                    <table id="rankingTable">
                        <thead>
                            <tr>
                                <th onclick="sortTable(0)">排名 <i class="fas fa-sort"></i></th>
                                <th onclick="sortTable(1)">姓名 <i class="fas fa-sort"></i></th>
                                <th onclick="sortTable(2)">用时 <i class="fas fa-sort"></i></th>
                                <th onclick="sortTable(3)">总积分 <i class="fas fa-sort"></i></th>
                                <th onclick="sortTable(4)">上周积分 <i class="fas fa-sort"></i></th>
                            </tr>
                        </thead>
                        <tbody id="rankingBody">
                            <tr>
                                <td>1</td>
                                <td>王建国</td>
                                <td>5h 45m</td>
                                <td>1250</td>
                                <td>300</td>
                            </tr>
                            <tr>
                                <td>2</td>
                                <td>李晓梅</td>
                                <td>5h 50m</td>
                                <td>1200</td>
                                <td>250</td>
                            </tr>
                            <tr>
                                <td>3</td>
                                <td>张小明</td>
                                <td>6h 02m</td>
                                <td>1180</td>
                                <td>100</td>
                            </tr>
                            <tr>
                                <td>4</td>
                                <td>赵强</td>
                                <td>6h 15m</td>
                                <td>1150</td>
                                <td>350</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="sponsor-section">
            <p>合作伙伴</p>
            <div class="sponsor-logos">
                <div class="sponsor-item">赞助商 Logo 1</div>
                <div class="sponsor-item">赞助商 Logo 2</div>
            </div>
        </div>
        <div class="footer-info">
            <p>© 2026 俱乐部名称. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
