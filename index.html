<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>定向越野积分排名系统</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo-title">
                <img src="images/event-logo.png" alt="Logo" class="event-logo" onerror="this.style.display='none'">
                <h1>定向越野积分赛</h1>
            </div>
            <nav>
                <a href="#" class="active">排名榜单</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="search-section">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="playerSearch" placeholder="输入选手姓名快速查找...">
            </div>
        </div>
        
        <section class="table-card">
            <div class="table-header">
                <h2>积分排名榜</h2>
            </div>
            <div class="table-responsive">
                <table id="rankingTable">
                    <thead>
                        <tr>
                            <th onclick="sortTable(0)">排名 <i class="fas fa-sort"></i></th>
                            <th onclick="sortTable(1)">姓名 <i class="fas fa-sort"></i></th>
                            <th onclick="sortTable(2)">用时 <i class="fas fa-sort"></i></th>
                            <th onclick="sortTable(3)">总积分 <i class="fas fa-sort"></i></th>
                            <th onclick="sortTable(4)">上周积分 <i class="fas fa-sort"></i></th>
                        </tr>
                    </thead>
                    <tbody id="rankingBody">
                        <tr><td colspan="5" style="text-align:center;">数据加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <footer>
        <div class="sponsor-section">
            <p>赞助与合作伙伴</p>
            <div class="sponsor-logos">
                <div class="sponsor-item">
                    <img src="images/sponsor-1.png" alt="赞助商1" class="sponsor-img" onerror="this.parentElement.innerText='赞助商1'">
                </div>
                <div class="sponsor-item">
                    <img src="images/sponsor-2.png" alt="赞助商2" class="sponsor-img" onerror="this.parentElement.innerText='赞助商2'">
                </div>
            </div>
        </div>
        <div class="footer-info">
            <p>© 2026 俱乐部名称 | 乐观地球</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
